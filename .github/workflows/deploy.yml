name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-1

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod

      - name: Build Lambda binary
        working-directory: backend
        env:
          GOOS: linux
          GOARCH: arm64
          CGO_ENABLED: "0"
        run: |
          go build -o bootstrap .
          zip lambda.zip bootstrap

      - name: Create artifact S3 bucket (if not exists)
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          BUCKET="pokemon-field-guide-artifacts-${ACCOUNT_ID}"
          echo "ARTIFACT_BUCKET=${BUCKET}" >> "$GITHUB_ENV"
          if ! aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
            aws s3api create-bucket \
              --bucket "$BUCKET" \
              --region ap-northeast-1 \
              --create-bucket-configuration LocationConstraint=ap-northeast-1
          fi

      - name: Upload Lambda zip to S3
        run: |
          KEY="backend/lambda-${{ github.sha }}.zip"
          echo "ARTIFACT_KEY=${KEY}" >> "$GITHUB_ENV"
          aws s3 cp backend/lambda.zip "s3://${ARTIFACT_BUCKET}/${KEY}"

      - name: Deploy CloudFormation stack
        run: |
          aws cloudformation deploy \
            --template-file infrastructure/template.yaml \
            --stack-name pokemon-field-guide \
            --capabilities CAPABILITY_IAM \
            --parameter-overrides \
              LambdaArtifactBucket="${ARTIFACT_BUCKET}" \
              LambdaArtifactKey="${ARTIFACT_KEY}" \
            --no-fail-on-empty-changeset

      - name: Get stack outputs
        run: |
          OUTPUTS=$(aws cloudformation describe-stacks \
            --stack-name pokemon-field-guide \
            --query 'Stacks[0].Outputs')
          API_URL=$(echo "$OUTPUTS" | jq -r '.[] | select(.OutputKey=="ApiURL") | .OutputValue')
          BUCKET_NAME=$(echo "$OUTPUTS" | jq -r '.[] | select(.OutputKey=="FrontendBucketName") | .OutputValue')
          echo "API_URL=${API_URL}" >> "$GITHUB_ENV"
          echo "FRONTEND_BUCKET=${BUCKET_NAME}" >> "$GITHUB_ENV"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend (Nuxt generate)
        working-directory: frontend
        env:
          NUXT_PUBLIC_API_BASE: ${{ env.API_URL }}api
        run: npm run generate

      - name: Sync frontend to S3
        run: |
          aws s3 sync frontend/.output/public "s3://${FRONTEND_BUCKET}" \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html"
          aws s3 cp frontend/.output/public/index.html "s3://${FRONTEND_BUCKET}/index.html" \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          DIST_ID=$(aws cloudformation describe-stacks \
            --stack-name pokemon-field-guide \
            --query 'Stacks[0].Outputs[?OutputKey==`CloudFrontURL`].OutputValue' \
            --output text | sed 's|https://||' | \
            xargs -I{} aws cloudfront list-distributions \
              --query "DistributionList.Items[?DomainName=='{}'].Id" \
              --output text)
          if [ -n "$DIST_ID" ]; then
            aws cloudfront create-invalidation --distribution-id "$DIST_ID" --paths "/*"
          fi
